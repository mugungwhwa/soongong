project_id = "soongong"

[api]
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# OTP 코드 로그인 이메일 (SOO-147 디자인 / SOO-260630-02 실연동).
# signInWithOtp(email) 발송 메일은 magic_link 템플릿을 사용한다. 코드 입장
# 방식이므로 템플릿 본문에서 {{ .Token }}(6자리)을 강조한다.
# ⚠️ 플랫폼(SOO-260630-02) 확인 필요: 실제 발송 렌더 + {{ .Token }} 치환 점검.
[auth.email.template.magic_link]
subject = "순공대장 입장 코드예요"
content_path = "./templates/otp-code.html"

[analytics]
enabled = false
